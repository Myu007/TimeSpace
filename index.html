<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TimeSpace">
<meta name="theme-color" content="#141820" id="themeColorMeta">
<title>TimeSpace</title>
<link rel="manifest" href="./manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─── */
:root {
  --amber:#f0b429; --amber-dim:rgba(240,180,41,.13); --amber-glow:rgba(240,180,41,.28);
  --teal:#22d3c8; --rose:#f47067; --violet:#a78bfa; --sky:#38bdf8; --lime:#86efac; --coral:#fb923c;
  --seg0:#22d3c8; --seg1:#a78bfa; --seg2:#fb923c; --seg3:#86efac; --seg4:#f47067; --seg5:#38bdf8; --seg6:#f0b429;
  --r:14px; --rl:20px; --rx:28px;
  --dur:.22s; --ease:cubic-bezier(.4,0,.2,1);
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"] {
  --bg:#141820; --bg2:#0e1016; --surf:#1e2330; --surf2:#252b3b; --surf3:#2d3448;
  --brd:rgba(255,255,255,.08); --brd2:rgba(255,255,255,.15);
  --txt:#eef0f6; --txt2:rgba(238,240,246,.6); --txt3:rgba(238,240,246,.32);
  --shd:rgba(0,0,0,.45); --ov:rgba(10,11,16,.88);
}
[data-theme="light"] {
  --bg:#f2efe8; --bg2:#e6e2d8; --surf:#ffffff; --surf2:#f8f6f1; --surf3:#eeebe3;
  --brd:rgba(0,0,0,.08); --brd2:rgba(0,0,0,.16);
  --txt:#1a1c24; --txt2:rgba(26,28,36,.58); --txt3:rgba(26,28,36,.33);
  --shd:rgba(0,0,0,.07); --ov:rgba(180,175,162,.88);
}
/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{
  min-height:100%; background:var(--bg); color:var(--txt);
  font-family:'Syne',sans-serif; overflow-x:hidden;
  transition:background var(--dur) var(--ease),color var(--dur) var(--ease);
  padding-bottom:calc(var(--sb) + 1.5rem);
}
/* grain */
body::after{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;
  opacity:.022;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
/* ─── SHELL ─── */
.shell{max-width:920px;margin:0 auto;padding:0 max(1rem,env(safe-area-inset-left));padding-top:calc(var(--st) + .5rem)}
/* ─── HEADER ─── */
header{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 0 1rem;gap:.8rem;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:.55rem}
.logo-mark{width:34px;height:34px;background:var(--amber);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 16px var(--amber-glow)}
.logo-mark svg{width:18px;height:18px}
.logo-text{font-size:1.2rem;font-weight:800;color:var(--txt);letter-spacing:-.03em;line-height:1}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase;display:block;margin-top:1px}
.header-r{display:flex;align-items:center;gap:.55rem}
.icon-btn{width:38px;height:38px;border-radius:11px;background:var(--surf);border:1px solid var(--brd);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background var(--dur),border-color var(--dur),transform .15s;flex-shrink:0}
.icon-btn:hover{background:var(--surf2);border-color:var(--brd2)}
.icon-btn:active{transform:scale(.93)}
.live-clock{text-align:right}
.ck-digits{font-family:'JetBrains Mono',monospace;font-size:clamp(1.1rem,4vw,1.7rem);font-weight:500;color:var(--amber);letter-spacing:-.04em;line-height:1}
.ck-date{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--txt3);letter-spacing:.06em;margin-top:2px;text-transform:uppercase}
/* ─── SUMMARY ─── */
.sum-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1.3rem}
.sum-cell{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:.85rem 1rem;transition:background var(--dur),border-color var(--dur)}
.sum-cell.hi{background:var(--amber-dim);border-color:rgba(240,180,41,.28)}
.sc-lbl{font-family:'JetBrains Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.12em;color:var(--txt3);margin-bottom:.3rem}
.sc-val{font-size:clamp(.88rem,3vw,1.35rem);font-weight:700;color:var(--txt);letter-spacing:-.02em;line-height:1.1}
.sc-val.am{color:var(--amber)}
.sc-sub{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--txt3);margin-top:2px}
/* ─── SECTION HEAD ─── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem}
.st{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.16em;color:var(--txt3)}
/* ─── TIMELINE ─── */
.tl-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rl);padding:1.1rem 1.2rem 1.7rem;margin-bottom:1.3rem;overflow:hidden}
.ruler{position:relative;height:20px;margin-bottom:.55rem}
.htick{position:absolute;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--txt3);user-select:none}
.htick-line{width:1px;height:5px;background:var(--brd2)}
.tl-bar{position:relative;height:50px;border-radius:10px;background:var(--surf3);overflow:visible;margin-bottom:2.3rem}
.seg{position:absolute;top:0;height:100%;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:filter .2s}
.seg:hover{filter:brightness(1.15)}
.seg-lbl{font-family:'JetBrains Mono',monospace;font-size:.54rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 5px;pointer-events:none}
[data-theme="dark"] .seg-lbl{color:rgba(255,255,255,.85)}
[data-theme="light"] .seg-lbl{color:rgba(0,0,0,.7)}
.needle{position:absolute;top:-10px;bottom:-10px;width:2px;background:var(--amber);border-radius:2px;z-index:20;pointer-events:none;box-shadow:0 0 0 1px var(--bg),0 0 14px var(--amber-glow);transition:left .8s linear}
.needle::before{content:'NOW';position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:.46rem;letter-spacing:.1em;color:var(--amber);white-space:nowrap}
.needle::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:var(--amber)}
.pin{position:absolute;bottom:-2.2rem;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;z-index:10}
.pin-dot{width:7px;height:7px;border-radius:50%;border:2px solid currentColor;background:var(--bg)}
.pin-stem{width:1px;height:9px}
.pin-info{font-family:'JetBrains Mono',monospace;font-size:.5rem;text-align:center;white-space:nowrap;margin-top:2px}
/* ─── GRID ─── */
.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,190px),1fr));gap:.65rem;margin-bottom:1.1rem}
.ec{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:1rem 1rem .9rem;position:relative;overflow:hidden;animation:cardIn .3s ease both;transition:background var(--dur),border-color var(--dur),transform .18s;touch-action:manipulation}
.ec:hover{transform:translateY(-2px)}
.ec:active{transform:scale(.98)}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ec.next{border-color:rgba(240,180,41,.42);background:linear-gradient(135deg,var(--surf),var(--amber-dim))}
.ec.past{opacity:.35}
.nb{position:absolute;top:.5rem;right:.5rem;background:var(--amber);color:#0e1016;font-family:'JetBrains Mono',monospace;font-size:.42rem;font-weight:500;letter-spacing:.1em;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.csb{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:var(--r) 0 0 var(--r)}
.ca-wrap{position:absolute;top:.45rem;right:.45rem;display:flex;gap:2px;opacity:0;transition:opacity .18s}
.ec:hover .ca-wrap,.ec:focus-within .ca-wrap{opacity:1}
@media(hover:none){.ca-wrap{opacity:1}}
.ca{width:24px;height:24px;border-radius:7px;background:var(--surf3);border:none;cursor:pointer;font-size:.68rem;display:flex;align-items:center;justify-content:center;color:var(--txt3);transition:color .15s,background .15s}
.ca:hover{color:var(--txt);background:var(--brd2)}
.ca.del:hover{color:var(--rose)}
.ca.arm{color:var(--amber)}
.adot{position:absolute;bottom:.65rem;right:.65rem;width:6px;height:6px;border-radius:50%;background:var(--amber);box-shadow:0 0 6px var(--amber)}
.ce{font-size:1.25rem;margin-bottom:.38rem;display:block}
.cn{font-size:.76rem;font-weight:600;color:var(--txt2);margin-bottom:.12rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:1.1rem}
.ct{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--txt);margin-bottom:.65rem}
.cd{font-size:clamp(1rem,3.5vw,1.35rem);font-weight:800;letter-spacing:-.03em;line-height:1}
.cd-s{font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--txt3);margin-top:3px;text-transform:uppercase;letter-spacing:.08em}
/* ─── EMPTY ─── */
.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;padding:2.5rem 1rem;gap:.6rem;color:var(--txt3)}
.empty-icon{font-size:2rem;opacity:.45}
.empty p{font-family:'JetBrains Mono',monospace;font-size:.68rem;text-align:center;line-height:1.8}
/* ─── FAB ─── */
.add-strip{display:flex;justify-content:center;padding:.5rem 0 .8rem}
.fab{display:flex;align-items:center;gap:.55rem;background:var(--amber);color:#111418;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:.02em;border:none;border-radius:50px;padding:.78rem 1.8rem;cursor:pointer;box-shadow:0 4px 20px var(--amber-glow);transition:opacity .2s,transform .18s,box-shadow .2s;touch-action:manipulation}
.fab:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 8px 28px var(--amber-glow)}
.fab:active{transform:scale(.97)}
.fab svg{width:15px;height:15px;flex-shrink:0}
/* ─── OVERLAY / MODAL ─── */
.ov{position:fixed;inset:0;z-index:1000;background:var(--ov);backdrop-filter:blur(14px) saturate(1.4);-webkit-backdrop-filter:blur(14px) saturate(1.4);display:flex;align-items:flex-end;justify-content:center;padding:1rem;padding-bottom:calc(var(--sb)+1rem);opacity:0;pointer-events:none;transition:opacity .28s}
@media(min-width:600px){.ov{align-items:center}}
.ov.open{opacity:1;pointer-events:all}
.modal{background:var(--surf);border:1px solid var(--brd2);border-radius:var(--rx);padding:1.4rem 1.4rem 1.7rem;width:100%;max-width:440px;max-height:92vh;overflow-y:auto;transform:translateY(32px);transition:transform .32s cubic-bezier(.34,1.56,.64,1);position:relative}
.ov.open .modal{transform:translateY(0)}
.handle{display:block;width:36px;height:4px;border-radius:2px;background:var(--brd2);margin:0 auto 1.3rem}
@media(min-width:600px){.handle{display:none}}
.modal-title{font-size:1.25rem;font-weight:800;letter-spacing:-.03em;margin-bottom:1.3rem;color:var(--txt)}
.mc{position:absolute;top:1.2rem;right:1.2rem;width:30px;height:30px;border-radius:8px;background:var(--surf3);border:none;color:var(--txt3);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.mc:hover{background:var(--brd2);color:var(--txt)}
/* form */
.field{margin-bottom:.95rem}
.fl{display:block;font-family:'JetBrains Mono',monospace;font-size:.56rem;text-transform:uppercase;letter-spacing:.14em;color:var(--txt3);margin-bottom:.4rem}
.fi,.fsel{width:100%;background:var(--surf3);border:1px solid var(--brd);border-radius:var(--r);color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:.9rem;padding:.68rem .9rem;outline:none;transition:border-color .18s,background .18s;-webkit-appearance:none;appearance:none}
.fi:focus,.fsel:focus{border-color:var(--amber);background:var(--surf2)}
.fsel option{background:var(--surf2);color:var(--txt)}
.eg2{display:flex;flex-wrap:wrap;gap:.38rem;margin-top:.45rem}
.eb{width:37px;height:37px;border-radius:var(--r);background:var(--surf3);border:1.5px solid transparent;font-size:1.05rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s,transform .12s}
.eb:hover{background:var(--surf2);transform:scale(1.08)}
.eb.active{border-color:var(--amber);background:var(--amber-dim)}
/* alarm row */
.arm-row{display:flex;align-items:center;justify-content:space-between;background:var(--surf3);border:1px solid var(--brd);border-radius:var(--r);padding:.68rem .9rem;margin-bottom:.95rem}
.arm-lbl-g{display:flex;flex-direction:column;gap:2px}
.arm-lbl{font-size:.8rem;font-weight:600;color:var(--txt)}
.arm-sub{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--txt3)}
/* toggle */
.tg-wrap{position:relative}
.tg-in{position:absolute;opacity:0;width:0;height:0}
.tg-tr{display:block;width:44px;height:26px;background:var(--surf2);border:1px solid var(--brd2);border-radius:13px;cursor:pointer;transition:background .2s;position:relative}
.tg-in:checked + .tg-tr{background:var(--amber);border-color:var(--amber)}
.tg-tr::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:var(--surf);box-shadow:0 1px 4px rgba(0,0,0,.3);transition:transform .22s cubic-bezier(.34,1.56,.64,1)}
.tg-in:checked + .tg-tr::after{transform:translateX(18px)}
/* modal actions */
.ma{display:flex;gap:.65rem;margin-top:1.4rem}
.btn-s{flex:1;background:var(--amber);border:none;border-radius:var(--r);color:#111418;font-family:'Syne',sans-serif;font-weight:700;font-size:.83rem;padding:.78rem;cursor:pointer;transition:opacity .2s,transform .15s}
.btn-s:hover{opacity:.88;transform:translateY(-1px)}
.btn-c{background:var(--surf3);border:1px solid var(--brd);border-radius:var(--r);color:var(--txt2);font-family:'Syne',sans-serif;font-size:.83rem;padding:.78rem 1.1rem;cursor:pointer;transition:background .15s}
.btn-c:hover{background:var(--surf2)}
/* ─── ALARM TOAST ─── */
.toast{position:fixed;top:max(1rem,calc(var(--st)+1rem));left:50%;transform:translateX(-50%) translateY(-140px);z-index:2000;background:var(--amber);color:#0e1016;border-radius:var(--rl);padding:.9rem 1.2rem;display:flex;align-items:center;gap:.9rem;min-width:270px;max-width:92vw;box-shadow:0 8px 32px var(--amber-glow);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateX(-50%) translateY(0)}
.ti{font-size:1.7rem}
.tt{flex:1}
.tn{font-weight:800;font-size:.92rem}
.ttm{font-family:'JetBrains Mono',monospace;font-size:.66rem;opacity:.72}
.td{background:rgba(0,0,0,.15);border:none;border-radius:8px;color:#0e1016;font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;padding:.38rem .65rem;cursor:pointer}
/* ─── RESPONSIVE ─── */
@media(max-width:420px){
  .sum-strip{grid-template-columns:1fr 1fr}
  .sum-cell:last-child{grid-column:1/-1}
  header{padding:.75rem 0 .75rem}
}
@media(min-width:700px){
  .shell{padding:0 2rem}
  .eg{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:900px){.eg{grid-template-columns:repeat(4,1fr)}}
/* needle pulse */
@keyframes pn{0%,100%{box-shadow:0 0 0 1px var(--bg),0 0 14px var(--amber-glow)}50%{box-shadow:0 0 0 1px var(--bg),0 0 28px rgba(240,180,41,.5)}}
.needle{animation:pn 2.5s ease-in-out infinite}
</style>
</head>
<body>

<!-- ALARM TOAST -->
<div class="toast" id="toast">
  <div class="ti" id="ti">⏰</div>
  <div class="tt">
    <div class="tn" id="tn">Alarm</div>
    <div class="ttm" id="tm">—</div>
  </div>
  <button class="td" id="td">DISMISS</button>
</div>

<div class="shell">
  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#111418" stroke-width="2.2" stroke-linecap="round">
          <circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 12"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">TimeSpace</div>
        <span class="logo-sub">day planner</span>
      </div>
    </div>
    <div class="header-r">
      <button class="icon-btn" id="themeBtn" title="Toggle theme">🌙</button>
      <div class="live-clock">
        <div class="ck-digits" id="ckd">--:--:--</div>
        <div class="ck-date" id="ckdt">---</div>
      </div>
    </div>
  </header>

  <!-- SUMMARY -->
  <div class="sum-strip">
    <div class="sum-cell hi">
      <div class="sc-lbl">Free until next</div>
      <div class="sc-val am" id="scF">—</div>
      <div class="sc-sub" id="scFS">no events</div>
    </div>
    <div class="sum-cell">
      <div class="sc-lbl">Next event</div>
      <div class="sc-val" id="scN" style="font-size:.88rem">—</div>
      <div class="sc-sub" id="scNT">—</div>
    </div>
    <div class="sum-cell">
      <div class="sc-lbl">Today's events</div>
      <div class="sc-val" id="scC">0</div>
      <div class="sc-sub" id="scP">0 past</div>
    </div>
  </div>

  <!-- TIMELINE -->
  <div class="sh"><span class="st">Timeline</span></div>
  <div class="tl-card">
    <div class="ruler" id="ruler"></div>
    <div class="tl-bar" id="tlBar">
      <div class="needle" id="needle"></div>
    </div>
  </div>

  <!-- EVENTS -->
  <div class="sh"><span class="st">Events &amp; Alarms</span></div>
  <div class="eg" id="eg">
    <div class="empty"><div class="empty-icon">🕐</div><p>No events yet.<br>Tap "Add Event" to begin.</p></div>
  </div>

  <!-- FAB -->
  <div class="add-strip">
    <button class="fab" id="openM">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>Add Event
    </button>
  </div>
</div>

<!-- MODAL -->
<div class="ov" id="ov">
  <div class="modal" role="dialog" aria-modal="true">
    <span class="handle"></span>
    <button class="mc" id="closeM">✕</button>
    <div class="modal-title">New Event</div>
    <div class="field">
      <label class="fl" for="iN">Event Name</label>
      <input class="fi" id="iN" placeholder="Class, Leave Home, Get Ready…" autocomplete="off"/>
    </div>
    <div class="field">
      <label class="fl" for="iT">Time</label>
      <input class="fi" id="iT" type="time"/>
    </div>
    <div class="field">
      <label class="fl" for="iTP">Type</label>
      <select class="fsel" id="iTP">
        <option value="0">🎓 Class / Destination</option>
        <option value="1">🚪 Leave Home</option>
        <option value="2">🚌 Travel / Transit</option>
        <option value="3">🪥 Get Ready / Prep</option>
        <option value="4">⚠️ Deadline / Alert</option>
        <option value="5">🎯 Task / Work</option>
        <option value="6">⭐ Other</option>
      </select>
    </div>
    <div class="field">
      <label class="fl">Icon</label>
      <div class="eg2" id="emojiG">
        <button class="eb active" data-e="🎓">🎓</button><button class="eb" data-e="🚪">🚪</button>
        <button class="eb" data-e="🚌">🚌</button><button class="eb" data-e="🪥">🪥</button>
        <button class="eb" data-e="⚠️">⚠️</button><button class="eb" data-e="🎯">🎯</button>
        <button class="eb" data-e="🏃">🏃</button><button class="eb" data-e="☕">☕</button>
        <button class="eb" data-e="📚">📚</button><button class="eb" data-e="🏥">🏥</button>
        <button class="eb" data-e="⭐">⭐</button><button class="eb" data-e="🕐">🕐</button>
        <button class="eb" data-e="🛌">🛌</button><button class="eb" data-e="🍽️">🍽️</button>
        <button class="eb" data-e="💊">💊</button><button class="eb" data-e="🏋️">🏋️</button>
      </div>
    </div>
    <!-- ALARM -->
    <div class="arm-row">
      <div class="arm-lbl-g">
        <span class="arm-lbl">⏰ Alarm at event time</span>
        <span class="arm-sub">Ring + vibrate when event starts</span>
      </div>
      <div class="tg-wrap">
        <input class="tg-in" type="checkbox" id="iA">
        <label class="tg-tr" for="iA"></label>
      </div>
    </div>
    <div class="ma">
      <button class="btn-c" id="cnBtn">Cancel</button>
      <button class="btn-s" id="svBtn">Add to Timeline →</button>
    </div>
  </div>
</div>

<script>
const COLORS=['#22d3c8','#a78bfa','#fb923c','#86efac','#f47067','#38bdf8','#f0b429'];
const TEMO=['🎓','🚪','🚌','🪥','⚠️','🎯','⭐'];
let events=JSON.parse(localStorage.getItem('ts_ev')||'[]');
let selE='🎓';
let firedAlarms=new Set();
let actx=null;

const save=()=>localStorage.setItem('ts_ev',JSON.stringify(events));
const now=()=>new Date();

function parseTime(hhmm){const[h,m]=hhmm.split(':').map(Number);const d=new Date();d.setHours(h,m,0,0);return d}
function mins(d){return d.getHours()*60+d.getMinutes()+d.getSeconds()/60}

function fmtCD(ms){
  if(ms<=0)return'Now';
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>=1)return`${h}h ${m}m`;if(m>=1)return`${m}m ${sec}s`;return`${sec}s`;
}
function fmtAP(hhmm){const[h,m]=hhmm.split(':').map(Number);return`${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`}

/* THEME */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙';
  document.getElementById('themeColorMeta').content=t==='dark'?'#141820':'#f2efe8';
  localStorage.setItem('ts_th',t);
}
{const s=localStorage.getItem('ts_th')||( window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');applyTheme(s);}
document.getElementById('themeBtn').addEventListener('click',()=>{
  applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
});

/* CLOCK */
function tickClock(){
  const d=new Date();
  document.getElementById('ckd').textContent=d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  document.getElementById('ckdt').textContent=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
}

/* AUDIO */
function playAlarm(){
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const ctx=actx;
    [[523.25,0],[659.25,.22],[783.99,.44],[1046.5,.66],[523.25,1],[659.25,1.22],[783.99,1.44],[1046.5,1.66]].forEach(([f,dt])=>{
      const o=ctx.createOscillator(),g=ctx.createGain(),t=ctx.currentTime+dt;
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.32,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.48);
      o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+.55);
    });
  }catch(e){}
  if(navigator.vibrate)navigator.vibrate([200,80,200,80,400]);
}

/* TOAST */
function showToast(ev){
  document.getElementById('ti').textContent=ev.emoji;
  document.getElementById('tn').textContent=ev.name;
  document.getElementById('tm').textContent=`Event at ${fmtAP(ev.time)} is starting now!`;
  document.getElementById('toast').classList.add('show');
  playAlarm();
  if(Notification.permission==='granted')try{new Notification(`⏰ ${ev.emoji} ${ev.name}`,{body:`Starts at ${fmtAP(ev.time)}`})}catch(e){}
  setTimeout(()=>document.getElementById('toast').classList.remove('show'),28000);
}
document.getElementById('td').addEventListener('click',()=>document.getElementById('toast').classList.remove('show'));

/* CHECK ALARMS */
function checkAlarms(){
  const d=new Date();
  const hhmm=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  if(d.getHours()===0&&d.getMinutes()===0)firedAlarms.clear();
  events.forEach(ev=>{
    if(ev.alarm&&ev.time===hhmm&&!firedAlarms.has(ev.id)&&d.getSeconds()<30){
      firedAlarms.add(ev.id);showToast(ev);
    }
  });
}

/* RANGE */
function getRange(){
  const nm=mins(now());
  if(!events.length)return{start:Math.max(0,nm-60),end:nm+7*60};
  const am=events.map(e=>{const[h,m]=e.time.split(':').map(Number);return h*60+m;});am.push(nm);
  return{start:Math.max(0,Math.min(...am)-60),end:Math.min(24*60,Math.max(...am)+90)};
}

/* RENDER TIMELINE */
function renderTL(){
  const bar=document.getElementById('tlBar');
  const ruler=document.getElementById('ruler');
  const needle=document.getElementById('needle');
  Array.from(bar.children).forEach(c=>{if(!c.classList.contains('needle'))bar.removeChild(c);});
  ruler.innerHTML='';
  const{start,end}=getRange();const span=end-start;
  for(let h=Math.ceil(start/60);h<=Math.floor(end/60);h++){
    const pct=((h*60-start)/span)*100;
    if(pct<0||pct>100)continue;
    const tk=document.createElement('div');tk.className='htick';tk.style.left=pct+'%';
    const ap=h>=12?'PM':'AM';tk.innerHTML=`${h%12||12}<span style="font-size:.4rem">${ap}</span><div class="htick-line"></div>`;
    ruler.appendChild(tk);
  }
  const nm=mins(now());needle.style.left=Math.min(100,Math.max(0,((nm-start)/span)*100))+'%';
  const sorted=[...events].sort((a,b)=>a.time.localeCompare(b.time));
  sorted.forEach((ev,i)=>{
    const[h,m]=ev.time.split(':').map(Number);const evM=h*60+m;
    const pct=((evM-start)/span)*100;
    const prevM=i===0?start:(()=>{const[ph,pm]=sorted[i-1].time.split(':').map(Number);return ph*60+pm;})();
    const sS=Math.max(start,prevM),sE=evM;
    if(sE>sS){
      const color=COLORS[ev.colorIdx%COLORS.length];
      const seg=document.createElement('div');seg.className='seg';
      seg.style.left=((sS-start)/span)*100+'%';seg.style.width=((sE-sS)/span)*100+'%';
      seg.style.background=color+'26';seg.style.borderLeft=`2px solid ${color}55`;
      const dm=sE-sS,dh=Math.floor(dm/60);
      const sl=document.createElement('div');sl.className='seg-lbl';sl.style.color=color;
      sl.textContent=dh>0?`${dh}h${dm%60>0?` ${dm%60}m`:''}`:dm+'m';
      seg.appendChild(sl);bar.insertBefore(seg,needle);
    }
    if(pct>=-1&&pct<=101){
      const color=COLORS[ev.colorIdx%COLORS.length];const cp=Math.min(97,Math.max(3,pct));
      const pin=document.createElement('div');pin.className='pin';pin.style.left=cp+'%';
      pin.innerHTML=`<div class="pin-dot" style="color:${color};border-color:${color}"></div><div class="pin-stem" style="background:${color}55"></div><div class="pin-info" style="color:${color}">${fmtAP(ev.time)}<br>${ev.emoji}</div>`;
      bar.appendChild(pin);
    }
  });
}

/* RENDER CARDS */
function renderCards(){
  const grid=document.getElementById('eg');grid.innerHTML='';
  const sorted=[...events].sort((a,b)=>a.time.localeCompare(b.time));
  const nd=now();let nextEv=null,pastC=0;
  if(!sorted.length){
    grid.innerHTML='<div class="empty"><div class="empty-icon">🕐</div><p>No events yet.<br>Tap "Add Event" to begin.</p></div>';
    updSum(null,0,0);return;
  }
  sorted.forEach((ev,i)=>{
    const evD=parseTime(ev.time);const ms=evD-nd;const isPast=ms<0;
    if(isPast)pastC++;
    const isNext=!isPast&&!nextEv;if(isNext)nextEv=ev;
    const color=COLORS[ev.colorIdx%COLORS.length];
    const card=document.createElement('div');
    card.className='ec'+(isPast?' past':'')+(isNext?' next':'');
    card.style.animationDelay=(i*.05)+'s';
    card.innerHTML=`
      <div class="csb" style="background:${color}"></div>
      ${isNext?'<div class="nb">NEXT</div>':''}
      <div class="ca-wrap">
        <button class="ca ${ev.alarm?'arm':''}" data-id="${ev.id}" data-a="alarm">${ev.alarm?'🔔':'🔕'}</button>
        <button class="ca del" data-id="${ev.id}" data-a="del">✕</button>
      </div>
      ${ev.alarm?'<div class="adot"></div>':''}
      <span class="ce">${ev.emoji}</span>
      <div class="cn">${ev.name}</div>
      <div class="ct">${fmtAP(ev.time)}</div>
      <div class="cd" style="color:${isPast?'var(--txt3)':color}" id="cd${ev.id}">${isPast?'—':fmtCD(ms)}</div>
      <div class="cd-s">${isPast?'passed':'remaining'}</div>`;
    grid.appendChild(card);
  });
  updSum(nextEv,sorted.length,pastC);
  grid.querySelectorAll('[data-a]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();const{id,a}=b.dataset;
    if(a==='del'){events=events.filter(ev=>ev.id!==id);save();renderAll();}
    else if(a==='alarm'){const ev=events.find(ev=>ev.id===id);if(ev){ev.alarm=!ev.alarm;if(ev.alarm)reqNotif();save();renderAll();}}
  }));
}

function updSum(nextEv,total,pastC){
  document.getElementById('scC').textContent=total||0;
  document.getElementById('scP').textContent=(pastC||0)+' past';
  if(!nextEv){document.getElementById('scF').textContent='∞';document.getElementById('scFS').textContent='no upcoming';document.getElementById('scN').textContent='—';document.getElementById('scNT').textContent='—';return;}
  const ms=parseTime(nextEv.time)-now();
  document.getElementById('scF').textContent=fmtCD(ms);
  document.getElementById('scFS').textContent='until next event';
  document.getElementById('scN').textContent=nextEv.emoji+' '+nextEv.name;
  document.getElementById('scNT').textContent=fmtAP(nextEv.time);
}

function renderAll(){renderTL();renderCards();}

/* TICK */
function tick(){
  tickClock();checkAlarms();
  const nd=now();
  events.forEach(ev=>{const el=document.getElementById('cd'+ev.id);if(!el)return;const ms=parseTime(ev.time)-nd;el.textContent=ms<0?'—':fmtCD(ms);});
  const sorted=[...events].sort((a,b)=>a.time.localeCompare(b.time));
  const nextEv=sorted.find(e=>parseTime(e.time)>nd);
  updSum(nextEv||null,events.length,events.filter(e=>parseTime(e.time)<nd).length);
  const{start,end}=getRange();const nm=mins(nd);
  const n=document.getElementById('needle');if(n)n.style.left=Math.min(100,Math.max(0,((nm-start)/(end-start))*100))+'%';
}

/* MODAL */
const ov=document.getElementById('ov');
const openModal=()=>{ov.classList.add('open');document.getElementById('iN').focus();};
const closeModal=()=>ov.classList.remove('open');
document.getElementById('openM').addEventListener('click',openModal);
document.getElementById('closeM').addEventListener('click',closeModal);
document.getElementById('cnBtn').addEventListener('click',closeModal);
ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});

document.getElementById('emojiG').addEventListener('click',e=>{
  const b=e.target.closest('.eb');if(!b)return;
  document.querySelectorAll('.eb').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');selE=b.dataset.e;
});
document.getElementById('iTP').addEventListener('change',function(){
  const em=TEMO[parseInt(this.value)]||'⭐';selE=em;
  document.querySelectorAll('.eb').forEach(b=>b.classList.toggle('active',b.dataset.e===em));
});

document.getElementById('svBtn').addEventListener('click',()=>{
  const name=document.getElementById('iN').value.trim();
  const time=document.getElementById('iT').value;
  const colorIdx=parseInt(document.getElementById('iTP').value)||0;
  const alarm=document.getElementById('iA').checked;
  if(!name||!time){document.getElementById('iN').focus();return;}
  events.push({id:Date.now().toString(),name,time,emoji:selE,colorIdx,alarm});
  if(alarm)reqNotif();save();renderAll();
  document.getElementById('iN').value='';document.getElementById('iA').checked=false;
  closeModal();
});
document.getElementById('iN').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('svBtn').click();});

function reqNotif(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();}

/* DEFAULT TIME */
const dt=new Date(Date.now()+60*60000);
document.getElementById('iT').value=`${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;

/* SW */
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

/* INIT */
renderAll();tickClock();tick();
setInterval(tick,1000);setInterval(renderTL,60000);
</script>
</body>
</html>
